name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.REGISTRY }}/${{ gitea.repository }}/ci:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo fmt
        run: cargo fmt --check
      - name: Run cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run cargo test
        run: cargo test