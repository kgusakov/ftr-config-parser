name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  TAILWIND_REBUILD: 1
  TAILWIND_BIN: tailwindcss
  CARGO_TERM_COLOR: always

jobs:
  build-alpine-package:
    name: Build Alpine Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: echo "value=$(git tag --points-at HEAD | head -n1)" >> $GITHUB_OUTPUT

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: alpine-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: alpine-cargo-

      - name: Build release binary (Alpine)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo/registry:/root/.cargo/registry" \
            -v "$HOME/.cargo/git:/root/.cargo/git" \
            -w /workspace \
            alpine:3.23 \
            sh -c "
              set -ex
              apk add --no-cache curl bash musl-dev gcc g++ make cmake pkgconf \
                clang-dev clang fontconfig-dev
              curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64-musl
              chmod +x tailwindcss-linux-x64-musl
              mv tailwindcss-linux-x64-musl /usr/local/bin/tailwindcss
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.94.0
              source /root/.cargo/env
              TAILWIND_REBUILD=1 TAILWIND_BIN=tailwindcss cargo build --release
            "

      - name: Build Alpine package
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/dist/alpine \
            alpine:3.23 \
            sh -c "
              set -ex
              apk add --no-cache alpine-sdk fontconfig
              abuild-keygen -n -a
              cp /root/.abuild/*.rsa.pub /etc/apk/keys/
              abuild -F checksum
              abuild -F
              cp /root/packages/dist/x86_64/*.apk /workspace/
            "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
